---
openapi: 3.1.1
info:
  title: Lance Catalog REST Specification
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 0.0.1
  description: |
    **Lance Catalog** is an OpenAPI specification on top of the storage-based Lance format.
    It provides an integration point for catalog service like Apache Hive MetaStore (HMS), Apache Gravitino, etc.
    to store and use Lance tables. To integrate, the catalog service implements a **Lance Catalog Adapter**,
    which is a REST server that converts the Lance catalog requests to native requests against the catalog service.
    Different tools can integrate with Lance Catalog using the generated OpenAPI clients in various languages,
    and invoke operations in Lance Catalog to read, write and manage Lance tables in the integrated catalog services.

servers:
  - url: "{scheme}://{host}:{port}/{basePath}"
    description: Generic server URL with all parts configurable
    variables:
      scheme:
        default: http
      host:
        default: localhost
      port:
        default: "2333"
      basePath:
        default: ""
  - url: "{scheme}://{host}/{basePath}"
    description: Server URL when the port can be inferred from the scheme
    variables:
      scheme:
        default: http
      host:
        default: localhost
      basePath:
        default: ""

security:
  - OAuth2: []
  - BearerAuth: []

paths:
  /v1/namespaces:
    post:
      tags: [ Namespace ]
      summary: >
        Create a new namespace. A catalog can manage one or more namespaces. A namespace is used to manage one or more tables.
        There are three modes when trying to create a namespace:
          * CREATE: Create the namespace if it does not exist. If a namespace of the same name already exists, the operation fails with 400.
          * EXIST_OK: Create the namespace if it does not exist. If a namespace of the same name already exists, the operation succeeds and the existing namespace is kept.
          * OVERWRITE: Create the namespace if it does not exist. If a namespace of the same name already exists, the existing namespace is dropped and a new namespace with this name with no table is created.
      operationId: CreateNamespace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNamespaceRequest'
      responses:
        200:
          $ref: '#/components/responses/CreateNamespaceResponse'
        400:
          $ref: '#/components/responses/BadRequestErrorResponse'
        403:
          $ref: '#/components/responses/ForbiddenResponse'
        406:
          $ref: '#/components/responses/UnsupportedOperationResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'

  /v1/namespaces/{ns}/tables:
    post:
      tags: [ Table ]
      summary: >
        Create a new table in the given namespace. A table represents a lance dataset. 
        In Lance catalog, a table must be hosted in a namespace.
      operationId: CreateTable
      parameters:
        - $ref: '#/components/parameters/ns'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        200:
          $ref: '#/components/responses/CreateTableResponse'
        400:
          $ref: '#/components/responses/BadRequestErrorResponse'
        403:
          $ref: '#/components/responses/ForbiddenResponse'
        406:
          $ref: '#/components/responses/UnsupportedOperationResponse'
        503:
          $ref: '#/components/responses/ServiceUnavailableResponse'
        5XX:
          $ref: '#/components/responses/ServerErrorResponse'

components:
  parameters:
    ns:
      name: ns
      in: path
      required: true
      schema: { type: string }

  schemas:
    ErrorModel:
      type: object
      description: JSON error model(based on [RFC-7807](https://datatracker.ietf.org/doc/html/rfc7807)) payload returned in a response with further details on the error
      required:
        - type
      properties:
        type:
          type: string
          description: a URI identifier that categorizes the error
          example: /errors/incorrect-user-pass
        title:
          type: string
          description: a brief, human-readable message about the error
          example: Incorrect username or password
        status:
          type: integer
          minimum: 400
          maximum: 600
          description: HTTP response code, (if present) it must match the actual HTTP code returned by the service
          example: 404
        detail:
          type: string
          description: a human-readable explanation of the error
          example: Authentication failed due to incorrect username or password
        instance:
          type: string
          description: a URI that identifies the specific occurrence of the error
          example: /login/log/abc123

    CreateNamespaceRequest:
      type: object
      required: [ name, mode ]
      properties:
        name: { type: string }
        mode:
          type: string
          enum: [ CREATE, EXIST_OK, OVERWRITE ]
        options:
          type: object
          additionalProperties: { type: string }

    CreateNamespaceResponse:
      type: object
      required:
        - name
      properties:
        name: { type: string }
        properties:
          type: object
          additionalProperties:
            type: string
          description:
            Properties stored on the namespace, if supported by the server.
          example: { "created_at": "1452120468" }
          default: { }

    CreateTableRequest:
      type: object
      required: [ name, definition ]
      properties:
        name: { type: string }
        definition:
          $ref: '#/components/schemas/TableDefinition'
        mode:
          type: string
          enum: [ CREATE, EXIST_OK, OVERWRITE ]
        write_options:
          type: object
          additionalProperties: true
          description: Optional write options for the table creation.
          nullable: true

    TableDefinition:
      type: object
      required: [ column_definitions, schema ]
      properties:
        column_definitions:
          type: array
          items:
            $ref: '#/components/schemas/ColumnDefinition'
        schema:
          $ref: '#/components/schemas/Schema'

    ColumnDefinition:
      type: object
      required: [ kind ]
      properties:
        kind:
          $ref: '#/components/schemas/ColumnKind'

    ColumnKind:
      type: string
      enum: [ PHYSICAL, EMBEDDING ]

    Schema:
      type: object
      required: [ fields, metadata ]
      properties:
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
        metadata:
          type: object
          additionalProperties: { type: string }

    Field:
      type: object
      required: [ name, data_type, nullable, dict_id, dict_is_ordered, metadata ]
      properties:
        name: { type: string }
        data_type:
          $ref: '#/components/schemas/DataType'
        nullable: { type: boolean }
        dict_id:
          type: integer
          format: int64
          deprecated: true
        dict_is_ordered: { type: boolean }
        metadata:
          type: object
          additionalProperties: { type: string }

    DataType:
      oneOf:
        - enum: [ Null, Boolean, Int8, Int16, Int32, Int64, UInt8, UInt16, UInt32, UInt64, Float16, Float32, Float64, Date32, Date64, Binary, LargeBinary, BinaryView, Utf8, LargeUtf8, Utf8View ]
          type: string
          description: Primitive data types

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ Timestamp ]
            time_unit:
              $ref: '#/components/schemas/TimeUnit'
            timezone:
              type: string
              nullable: true
          description: Timestamp with time unit and optional timezone

        - type: object
          required: [ type, time_unit ]
          properties:
            type:
              type: string
              enum: [ Time32, Time64, Duration ]
            time_unit:
              $ref: '#/components/schemas/TimeUnit'

        - type: object
          required: [ type, interval_unit ]
          properties:
            type:
              type: string
              enum: [ Interval ]
            interval_unit:
              $ref: '#/components/schemas/IntervalUnit'

        - type: object
          required: [ type, size ]
          properties:
            type:
              type: string
              enum: [ FixedSizeBinary ]
            size:
              type: integer
              format: int32

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ List ]
            element:
              $ref: '#/components/schemas/Field'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ ListView ]
            element:
              $ref: '#/components/schemas/Field'

        - type: object
          required: [ type, size ]
          properties:
            type:
              type: string
              enum: [ FixedSizeList ]
            element:
              $ref: '#/components/schemas/Field'
            size:
              type: integer
              format: int32

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ LargeList ]
            element:
              $ref: '#/components/schemas/Field'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ LargeListView ]
            element:
              $ref: '#/components/schemas/Field'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ Struct ]
            fields:
              type: array
              items:
                $ref: '#/components/schemas/Field'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ Union ]
            union_fields:
              $ref: '#/components/schemas/UnionFields'
            union_mode:
              $ref: '#/components/schemas/UnionMode'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ Dictionary ]
            key_type:
              $ref: '#/components/schemas/DataType'
            value_type:
              $ref: '#/components/schemas/DataType'

        - type: object
          required: [ type, precision, scale ]
          properties:
            type:
              type: string
              enum: [ Decimal128 ]
            precision:
              type: integer
              format: uint8
              minimum: 1
              maximum: 38
            scale:
              type: integer
              format: int8

        - type: object
          required: [ type, precision, scale ]
          properties:
            type:
              type: string
              enum: [ Decimal256 ]
            precision:
              type: integer
              format: uint8
              minimum: 1
              maximum: 76
            scale:
              type: integer
              format: int8

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ Map ]
            key_sorted:
              type: boolean
            element:
              $ref: '#/components/schemas/Field'

        - type: object
          required: [ type ]
          properties:
            type:
              type: string
              enum: [ RunEndEncoded ]
            run_ends:
              $ref: '#/components/schemas/Field'
            values:
              $ref: '#/components/schemas/Field'

    TimeUnit:
      type: string
      enum: [ Second, Millisecond, Microsecond, Nanosecond ]
      description: Time unit for temporal types

    IntervalUnit:
      type: string
      enum: [ YearMonth, DayTime, MonthDayNano ]
      description: Interval units

    UnionMode:
      type: string
      enum: [ Sparse, Dense ]

    UnionFields:
      type: array
      items:
        $ref: '#/components/schemas/Field'

  responses:
    CreateNamespaceResponse:
      description:
        Represents a successful call to create a namespace.
        Returns the namespace created, as well as any properties that were stored for the namespace,
        including those the server might have added. Implementations are not required to support namespace
        properties.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateNamespaceResponse'
          example: {
            "namespace": [ "lance.ns1" ],
            "properties": { "created_at": "1452120468" }
          }

    CreateTableResponse:
      type: object
      required:
        - name
      properties:
        name: { type: string }
        properties:
          type: object
          additionalProperties:
            type: string
          description:
            Properties stored on the table, if supported by the server.
          example: { "created_at": "1452120468" }
          default: { }

    BadRequestErrorResponse:
      description:
        Indicates a bad request error. It could be caused by an unexpected request
        body format or other forms of request validation failure, such as invalid json.
        Usually serves application/json content, although in some cases simple text/plain content might
        be returned by the server's middleware.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example: {
            "type": "/errors/bad-request",
            "title": "Malformed request",
            "status": 400,
            "detail": "",
            "instance": "/v1/namespaces"
          }

    ForbiddenResponse:
      description: Forbidden. Authenticated user does not have the necessary permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example: {
            "type": "/errors/forbidden-request",
            "title": "Not authorized to make this request",
            "status": 403,
            "detail": "",
            "instance": "/v1/namespaces"
          }

    UnsupportedOperationResponse:
      description: Not Acceptable / Unsupported Operation. The server does not support this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example: {
            "type": "/errors/unsupported-operation",
            "title": "The server does not support this operation",
            "status": 406,
            "detail": "",
            "instance": "/v1/namespaces"
          }

    ServiceUnavailableResponse:
      description:
        The service is not ready to handle the request. The client should wait and retry.
        The service may additionally send a Retry-After header to indicate when to retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example: {
            "type": "/errors/service-unavailable",
            "title": "Slow down",
            "status": 503,
            "detail": "",
            "instance": "/v1/namespaces"
          }

    ServerErrorResponse:
      description:
        A server-side problem that might not be addressable from the client
        side. Used for server 5xx errors without more specific documentation in
        individual routes.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'
          example: {
            "type": "/errors/server-error",
            "title": "Internal Server Error",
            "status": 500,
            "detail": "",
            "instance": "/v1/namespaces"
          }
